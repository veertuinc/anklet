# Note: Don't specify any credentials for the plugin. We will inject them into the config for you.
plugins:
  - name: GITHUB_HANDLER1
    plugin: github
    host_to_guest_folder_mounts:
      # Dedicated host dir (not /tmp); guest_folder_name must appear in logged mountSpec.
      - "/tmp/anklet_ci_mount_host:anklet_mount_test"
